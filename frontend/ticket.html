<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ticket - Bus Ticket Management System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .ticket-page {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 2rem 0;
        }
        .ticket-card {
            background: #fff;
            max-width: 700px;
            margin: 0 auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            position: relative;
        }
        .ticket-header {
            background: #007bff;
            color: #fff;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .ticket-body {
            padding: 2rem;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
            margin-bottom: 2rem;
        }
        .info-item label {
            display: block;
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }
        .info-item p {
            font-weight: bold;
            font-size: 1.1rem;
            margin: 0;
        }
        .ticket-footer {
            border-top: 2px dashed #ddd;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fafafa;
        }
        .barcode {
            font-family: 'Libre Barcode 39', cursive;
            font-size: 3rem;
            color: #333;
        }
        .status-badge {
            background: #28a745;
            color: #fff;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .print-btn {
            display: block;
            width: 200px;
            margin: 2rem auto;
            padding: 1rem;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
        }
        @media print {
            .print-btn, header, footer {
                display: none;
            }
            body {
                background: #fff;
            }
            .ticket-page {
                padding: 0;
            }
            .ticket-card {
                box-shadow: none;
                border: 1px solid #ddd;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>
                <svg width="40" height="40" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle; margin-right: 12px;">
                    <path d="M20 12h-1V8h1v4zm-13 0h1V8H7v4zm13 3.5V18c0 .83-.67 1.5-1.5 1.5h-1c-.83 0-1.5-.67-1.5-1.5v-.5H8v.5c0 .83-.67 1.5-1.5 1.5h-1C4.67 19.5 4 18.83 4 18v-2.5c0-.83.67-1.5 1.5-1.5h13c.83 0 1.5.67 1.5 1.5zM18 14H6c-1.1 0-2 .9-2 2v4c0 1.1.9 2 2 2h1v1c0 .55.45 1 1 1s1-.45 1-1v-1h8v1c0 .55.45 1 1 1s1-.45 1-1v-1h1c1.1 0 2-.9 2-2v-4c0-1.1-.9-2-2-2zM17 6H7c-1.1 0-2 .9-2 2v5h14V8c0-1.1-.9-2-2-2zm-1 2H8v4h8V8z"/>
                    <circle cx="7.5" cy="17.5" r="1.5" fill="white"/>
                    <circle cx="16.5" cy="17.5" r="1.5" fill="white"/>
                </svg>
                LETS GO
            </h1>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="admin.html">Admin</a></li>
                    <li><a href="my-bookings.html">My Booking</a></li>
                    <li class="profile-dropdown">
                        <input type="checkbox" id="profile-toggle" class="dropdown-toggle">
                        <label for="profile-toggle" class="dropdown-label">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                            Profile
                        </label>
                        <div class="dropdown-menu">
                            <div class="profile-card">
                                <div class="profile-avatar" id="profile-avatar">U</div>
                                <h4 class="user-name" id="profile-name">User</h4>
                                <p class="user-email" id="profile-email">user@example.com</p>
                            </div>
                        </div>
                    </li>
                    <li><button id="nav-logout-btn" class="logout-btn">Logout</button></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="ticket-page">
        <div id="ticket-content">
            <p style="text-align: center;">Loading ticket...</p>
        </div>
        <button class="print-btn" onclick="downloadPDF()" id="print-btn" style="display: none;">Download PDF</button>
        <a href="index.html" style="display:block; text-align:center; color:#007bff; text-decoration:none; margin-top:1rem;">Back to Home</a>
    </main>

    <script src="api.js"></script>
    <script>
        let currentBooking = null;

        document.addEventListener('DOMContentLoaded', async () => {
            // Get booking ID from URL or sessionStorage
            const urlParams = new URLSearchParams(window.location.search);
            let bookingId = urlParams.get('booking');
            let bookingRef = urlParams.get('reference');

            if (!bookingId) {
                bookingId = sessionStorage.getItem('ticketBookingId');
            }
            if (!bookingRef) {
                bookingRef = sessionStorage.getItem('bookingReference');
            }

            if (!bookingId && !bookingRef) {
                document.getElementById('ticket-content').innerHTML = `
                    <div class="ticket-card">
                        <div class="ticket-body">
                            <p style="text-align: center; color: #dc3545;">No booking found. Please make a booking first.</p>
                        </div>
                    </div>
                `;
                return;
            }

            try {
                // Try to get booking by ID first
                if (bookingId) {
                    const data = await BookingsAPI.getBooking(bookingId);
                    currentBooking = data.booking;
                } 
                // Fallback to booking reference
                else if (bookingRef) {
                    const data = await BookingsAPI.getBookingByReference(bookingRef);
                    currentBooking = data.booking;
                    bookingId = currentBooking.id; // Store ID for PDF download
                }

                if (!currentBooking) {
                    throw new Error('Booking not found');
                }

                displayTicket(currentBooking);
            } catch (error) {
                document.getElementById('ticket-content').innerHTML = `
                    <div class="ticket-card">
                        <div class="ticket-body">
                            <p style="text-align: center; color: #dc3545;">Error loading ticket: ${error.message}</p>
                            <p style="text-align: center; margin-top: 1rem;"><a href="index.html" style="color: #007bff;">Back to Home</a></p>
                        </div>
                    </div>
                `;
            }
        });

        function displayTicket(booking) {
            const seatNumbers = booking.seats.map(s => s.seat_number).join(', ');
            const travelDate = new Date(booking.travel_date).toLocaleDateString('en-GB', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            const departureTime = booking.bus.departure_time;
            const statusColor = booking.status === 'confirmed' ? '#28a745' : '#ffc107';
            const route = booking.bus.route || { start_location: 'N/A', destination: 'N/A' };

            const ticketHTML = `
                <div class="ticket-card">
                    <div class="ticket-header">
                        <div>
                            <h2 style="margin:0;">E-TICKET</h2>
                            <p style="margin:0.2rem 0 0; opacity:0.8;">${booking.status === 'confirmed' ? 'Confirmed Booking' : 'Payment Pending'}</p>
                        </div>
                        <div class="status-badge" style="background: ${statusColor};">${booking.status.toUpperCase()}</div>
                    </div>

                    <div class="ticket-body">
                        <div class="info-grid">
                            <div class="info-item">
                                <label>Passenger Name</label>
                                <p>${booking.passenger_name}</p>
                            </div>
                            <div class="info-item">
                                <label>Ticket ID</label>
                                <p>#${booking.booking_reference}</p>
                            </div>
                            <div class="info-item">
                                <label>From</label>
                                <p>${route.start_location}</p>
                            </div>
                            <div class="info-item">
                                <label>To</label>
                                <p>${route.destination}</p>
                            </div>
                            <div class="info-item">
                                <label>Date & Time</label>
                                <p>${travelDate}, ${departureTime}</p>
                            </div>
                            <div class="info-item">
                                <label>Seat Number(s)</label>
                                <p>${seatNumbers}</p>
                            </div>
                            <div class="info-item">
                                <label>Bus Type</label>
                                <p>${booking.bus.bus_type}</p>
                            </div>
                            <div class="info-item">
                                <label>Fare Amount</label>
                                <p>₹ ${booking.total_amount.toFixed(2)}</p>
                            </div>
                        </div>
                    </div>

                    <div class="ticket-footer">
                        <div>
                            <p style="margin:0; font-weight:bold;">Bus Booking System</p>
                            <p style="margin:0; font-size:0.8rem; color:#666;">Scan for validation</p>
                        </div>
                        <div style="text-align:right;">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=80x80&data=${booking.booking_reference}" alt="Ticket QR">
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('ticket-content').innerHTML = ticketHTML;
            document.getElementById('print-btn').style.display = 'block';
        }

        async function downloadPDF() {
            if (!currentBooking) {
                alert('Booking information not available');
                return;
            }

            try {
                // Use booking ID directly from currentBooking
                await PaymentAPI.downloadTicket(currentBooking.id);
            } catch (error) {
                alert('Error downloading PDF: ' + error.message);
            }
        }

        // Logout functionality
        document.getElementById('nav-logout-btn').addEventListener('click', () => {
            AuthAPI.logout();
        });

        // Update profile card with user info
        if (isAuthenticated()) {
            const user = getCurrentUser();
            if (user) {
                const avatarEl = document.getElementById('profile-avatar');
                const nameEl = document.getElementById('profile-name');
                const emailEl = document.getElementById('profile-email');
                
                if (avatarEl) {
                    avatarEl.textContent = user.full_name ? user.full_name.charAt(0).toUpperCase() : 'U';
                }
                if (nameEl) {
                    nameEl.textContent = user.full_name || 'User';
                }
                if (emailEl) {
                    emailEl.textContent = user.email || 'user@example.com';
                }
            }
        }
    </script>

    <script src="chatbot.js"></script>

    <footer>
        <div class="container">
            <p>&copy; 2024 Bus Ticket Management System. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
